<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nomination Submitted</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; text-align: center; margin-top: 80px; background-color: #f9fafb; color: #1f2937; }
        .success-box { border: 1px solid #d1d5db; padding: 40px; display: inline-block; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); max-width: 500px; }
        .success-icon { font-size: 48px; color: #10b981; margin-bottom: 20px; }
        .token { font-weight: 700; background: #f3f4f6; padding: 6px 12px; border-radius: 6px; letter-spacing: 1px; color: #374151; font-family: monospace; font-size: 1.1em;}
        .btn { display: inline-block; padding: 12px 24px; margin: 10px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background-color 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; color: #2563eb; border: 2px solid #2563eb; }
        .btn-outline:hover { background: #eff6ff; color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="success-icon">✓</div>
        <h1 style="margin-top: 0; color: #111827;">Success!</h1>
        <p>Thank you, <strong>{{ name }}</strong>.<br>Your nomination has been submitted successfully.</p>
        <div style="margin: 30px 0;">
            <p style="font-size: 0.9em; color: #6b7280; margin-bottom: 8px;">Your tracking token</p>
            <span class="token">{{ token }}</span>
        </div>
        <p style="font-size: 0.95em; color: #4b5563; margin-bottom: 20px;">Download a copy of your submitted form:</p>
        <div>
            <a href="{{ url_for('download_pdf', token=token) }}" class="btn">Download PDF</a>
            <a href="{{ url_for('download_docx', token=token) }}" class="btn btn-outline">Download DOCX</a>
        </div>
        <div style="margin-top: 30px;">
            <a href="{{ url_for('index') }}" style="color: #6b7280; text-decoration: none; font-size: 0.9em; font-weight: 600;">&larr; Return to Home</a>
        </div>
    </div>
</body>
</html>
